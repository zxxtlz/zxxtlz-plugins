<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>zxxtlz-plugins</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #111;
            background: #fff;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        h3 {
            margin-top: 25px;
        }

        a {
            color: #0366d6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .plugin {
            margin-top: 20px;
            padding-left: 10px;
            border-left: 3px solid #eee;
        }

        .desc {
            color: #444;
            margin: 5px 0 10px;
        }

        .url {
            font-family: monospace;
            color: #555;
        }
    </style>
</head>

<body>
    <h1>zxxtlz Plugins</h1>

    <h2>How to install?</h2>
    <p>Copy & Paste a plugin URL into the Plugins page of Zxxtlz.</p>

    <h2>Plugin list</h2>

    <div class="plugin">
        <h3>Squarecord</h3>
        <p class="desc">
            90–95% square Discord
        </p>
        <p class="url">
            <a href="https://zxxtlz.github.io/zxxtlz-plugins/sqarecord/">
                https://zxxtlz.github.io/zxxtlz-plugins/sqarecord/
            </a>
        </p>
    </div>

</body>
</html>
